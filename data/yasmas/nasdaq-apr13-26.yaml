trader_name: SwingParty Nasdaq Weekly
zmq:
  endpoint: tcp://localhost:5555
bot:
  data_dir: data/yasmas/nasdaq-apr13-26
  state_file: data/yasmas/nasdaq-apr13-26/state.yaml
  warm_up_hours: 250
  use_symbol_subdirs: false
  fetch:
    delay_seconds: 5
    poll_interval_seconds: 3
    timeout_seconds: 30
broker:
  type: paper
  initial_cash: 100000
  fulfillment:
    target_improvement_pct: 0.02
    abort_threshold_pct: 0.3
    timeout_minutes: 30
    on_timeout: market
exchange:
  type: massive
  request_timeout_seconds: 10
  max_retries: 3
strategy:
  config: ../../config/strategies/swing_party/nasdaq_apr13_26_strategy.yaml
reporting:
  trade_log: data/yasmas/nasdaq-apr13-26/trades.csv
  output_dir: data/yasmas/nasdaq-live/reports
  report_file: data/yasmas/nasdaq-live/reports/report.html
  cost_per_trade_pct: 0.05
logging:
  file: data/yasmas/nasdaq-apr13-26/swing_bot.log
  level: INFO
  max_days: 30
