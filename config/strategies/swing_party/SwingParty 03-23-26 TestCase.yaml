backtest:
  name: "SwingParty 03-23-26"
  version: "v1"
  initial_cash: 100000
  start_date: "2026-03-23"
  end_date: "2026-03-27"

data_source:
  type: csv_file
  parser: binance_kline
  params:
    data_dir: "data/backtests/nasdaq-sim-N11-massive/nasdaq-scoring-simulation-momentum/2026-03-23_2026-03-27/ohlcv"
    file_pattern: "{symbol}-5m-2026-03-23_2026-03-27.csv"

strategy:
  type: swing_party
  max_positions: 3
  resample_interval: "1h"
  supertrend_atr_period: 10
  supertrend_multiplier: 2.0

  scorer:
    type: volume_breakout
    params:
      short_window: 8
      long_window: 100

  assets:
    - ARM
    - BKR
    - CCEP
    - CEG
    - CTAS
    - EXC
    - MSTR
    - PDD
    - SHOP
    - TSLA