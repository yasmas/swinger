backtest:
  name: Nasdaq apr13-26
  version: v1
  initial_cash: 100000.0
  start_date: '2026-04-13'
  end_date: '2026-04-17'
data_source:
  type: csv_file
  parser: binance_kline
  params:
    data_dir: data/yasmas/nasdaq-live
    file_pattern: '{symbol}-5m-2026-03-05_2026-04-17.csv'
strategy:
  type: swing_party
  max_positions: 3
  resample_interval: 1h
  supertrend_atr_period: 10
  supertrend_multiplier: 2.0
  catchup_enabled: true
  entry_persist_max_bars: 4
  entry_persist_max_price_drift: 0.01
  scorer:
    type: volume_breakout
    params:
      short_window: 8
      long_window: 100
  assets:
  - ARM
  - BKR
  - CCEP
  - CEG
  - CTAS
  - EXC
  - MSTR
  - PDD
  - SHOP
  - TSLA
