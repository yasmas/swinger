backtest:
  name: "SwingParty APR10 Party"
  version: "v1"
  initial_cash: 100000
  start_date: "2026-04-10"
  end_date: "2026-04-10"

data_source:
  type: csv_file
  parser: binance_kline
  params:
    data_dir: "data/backtests"
    file_pattern: "{symbol}-5m-2026-04-10.csv"

strategy:
  type: swing_party
  max_positions: 2
  resample_interval: "1h"
  supertrend_atr_period: 10
  supertrend_multiplier: 2.0

  scorer:
    type: volume_breakout
    params:
      short_window: 8
      long_window: 100

  assets:
    - SMCI
    - TPL
    - COHR
    - AKAM
    - FICO
    - NOW
    - AVGO
