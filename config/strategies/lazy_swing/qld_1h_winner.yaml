backtest:
  name: "LazySwing QLD Dev"
  version: "1h-atr12-mult1.25"
  initial_cash: 100000
  start_date: "2024-01-01"
  end_date: "2025-12-31"

data_source:
  type: "csv_file"
  parser: "binance_kline"
  params:
    file_path: "data/QLD-5m-2024-2025.csv"
    symbol: "QLD"

strategies:
  - type: "lazy_swing"
    params:
      supertrend_atr_period: 12
      supertrend_multiplier: 1.25
      resample_interval: "1h"
      cost_per_trade_pct: 0.05
