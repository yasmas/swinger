backtest:
  name: "LazySwing ETH Dev"
  version: "v1"
  initial_cash: 100000
  start_date: "2023-08-31"
  end_date: "2024-12-31"

data_source:
  type: "csv_file"
  parser: "coinbase_intx_kline"
  params:
    file_path: "data/ETH-PERP-INTX-5m-all.csv"
    symbol: "ETH-PERP-INTX"

strategies:
  - type: "lazy_swing"
    params:
      supertrend_atr_period: 20
      supertrend_multiplier: 2.0
      hmacd_fast: 24
      hmacd_slow: 51
      hmacd_signal: 12
      cost_per_trade_pct: 0.05
