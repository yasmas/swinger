backtest:
  name: "LazySwing Silver Dev"
  version: "v3"
  initial_cash: 100000
  start_date: "2022-01-01"
  end_date: "2024-12-31"

data_source:
  type: "csv_file"
  parser: "binance_kline"
  params:
    file_path: "data/silver/SI-5m-2022-2024.csv"
    symbol: "SI"

strategies:
  - type: "lazy_swing"
    params:
      supertrend_atr_period: 20
      supertrend_multiplier: 2.5
      hmacd_fast: 24
      hmacd_slow: 51
      hmacd_signal: 12
      cost_per_trade_pct: 0.05
