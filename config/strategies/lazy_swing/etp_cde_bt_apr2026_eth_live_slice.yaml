# ETP-20DEC30-CDE, same calendar slice as etp_cde_bt_apr2026_slice.yaml, strategy params from eth_live.yaml.

backtest:
  name: "ETP CDE LazySwing eth_live Apr2026 slice"
  version: "v2"
  initial_cash: 100000
  start_date: "2026-04-01"
  end_date: "2026-04-30"

data_source:
  type: "csv_file"
  parser: "coinbase_intx_kline"
  params:
    file_path: "data/yasmas/bt_apr2026_compare/ETP-20DEC30-CDE-5m-apr9_1032pdt_slice.csv"
    symbol: "ETP-20DEC30-CDE"

strategies:
  - type: "lazy_swing"
    params:
      resample_interval: "30min"
      supertrend_atr_period: 20
      supertrend_multiplier: 1.5
      hmacd_fast: 24
      hmacd_slow: 51
      hmacd_signal: 12
      cost_per_trade_pct: 0.05
