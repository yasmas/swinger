backtest:
  name: "LazySwing BIP Test"
  version: "v4"
  initial_cash: 100000
  start_date: "2025-07-20"
  end_date: "2025-12-31"

data_source:
  type: "csv_file"
  parser: "binance_kline"
  params:
    file_path: "data/BIP-20DEC30-CDE-5m-2025.csv"
    symbol: "BIP-20DEC30-CDE"

strategies:
  - type: "lazy_swing"
    params:
      supertrend_atr_period: 10
      supertrend_multiplier: 2
      hmacd_fast: 24
      hmacd_slow: 51
      hmacd_signal: 12
      cost_per_trade_pct: 0.05
