backtest:
  name: "LazySwing MU Dev"
  version: "v1"
  initial_cash: 100000
  start_date: "2023-04-01"
  end_date: "2024-12-31"

data_source:
  type: "csv_file"
  parser: "binance_kline"
  params:
    file_path: "data/backtests/MU-5m-2023-2026.csv"
    symbol: "MU"

strategies:
  - type: "lazy_swing"
    params:
      supertrend_atr_period: 10
      supertrend_multiplier: 2
      hmacd_fast: 24
      hmacd_slow: 51
      hmacd_signal: 12
      cost_per_trade_pct: 0.05
