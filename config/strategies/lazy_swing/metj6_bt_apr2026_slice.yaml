# Same window and LazySwing params as etp_cde_bt_apr2026_slice.yaml; METJ6 (Micro Ether Apr 2026) 5m from Databento.

backtest:
  name: "METJ6 LazySwing 1h Apr2026 slice"
  version: "hof-2025"
  initial_cash: 100000
  start_date: "2026-04-01"
  end_date: "2026-04-30"

data_source:
  type: "csv_file"
  parser: "coinbase_intx_kline"
  params:
    file_path: "data/yasmas/bt_apr2026_compare/METJ6-5m-apr9_1032pdt_slice.csv"
    symbol: "METJ6"

strategies:
  - type: "lazy_swing"
    params:
      resample_interval: "1h"
      supertrend_atr_period: 20
      supertrend_multiplier: 1.0
      hmacd_fast: 24
      hmacd_slow: 51
      hmacd_signal: 12
      cost_per_trade_pct: 0.05
